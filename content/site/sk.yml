why:
  eyebrow: Prečo Chorvátsko
  title: Stabilné európske prostredie s výnimočným potenciálom.
  lead: Chorvátsko spája bezpečie Európskej únie, euro, silnú turistickú ekonomiku a životný štýl, ktorý dlhodobo priťahuje slovenských občanov aj investorov.
  reasons:
    - - Člen Európskej únie
      - Spoločný právny a ekonomický rámec uľahčuje pohyb osôb, kapitálu aj podnikanie.
    - - Euro ako mena
      - Jednoduchšie platby, plánovanie investícií a menšie kurzové riziko.
    - - Stabilný trh
      - Predvídateľné prostredie a rastúci záujem zahraničných investorov.
    - - Atraktívne investície
      - Príležitosti v nehnuteľnostiach, turizme, službách a miestnom podnikaní.
    - - Rozvinutý turizmus
      - Silný medzinárodný dopyt a dlhodobá známosť destinácie.
    - - Výborná dostupnosť
      - Cestné aj letecké spojenie so Slovenskou republikou počas celého roka.
    - - Kvalita života
      - Bezpečie, príroda, klíma, gastronómia a blízkosť mora.
  sectorsTitle: Príležitosti, ktoré dávajú zmysel
  sectors:
    - Rezidenčné nehnuteľnosti
    - Turistické ubytovanie
    - Služby a obchod
    - Miestne partnerstvá
