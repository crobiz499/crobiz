about:
  eyebrow: O CROBIZ
  title: Špecializované poradenstvo medzi Slovenskom a Chorvátskom.
  lead: CROBIZ je špecializovaná poradenská spoločnosť poskytujúca podporu slovenským občanom, podnikateľom a investorom v Chorvátsku.
  storyTitle: O spoločnosti CROBIZ
  story: Zakladateľkou CROBIZ je Ivana Pisac, ktorá vďaka výbornej znalosti chorvátskeho a českého jazyka, blízkosti slovenského prostredia a znalosti podnikateľského prostredia pomáha klientom koordinovať administratívne a obchodné procesy.
  values:
    - - Obsah pre slovenských klientov
      - Zrozumiteľné informácie v slovenčine a koordinácia v chorvátskom prostredí.
    - - Individuálny prístup
      - Riešenie prispôsobené vášmu cieľu, rozpočtu a časovým možnostiam.
    - - Profesionálna koordinácia
      - Prehľadné kroky, priebežné informácie a zodpovednosť za komunikáciu.
    - - Dlhodobé vzťahy
      - Nejde nám o jednorazovú službu, ale o partnerstvo založené na dôvere.
  networkTitle: Sieť overených partnerov po celom Chorvátsku
blog:
  eyebrow: Sprievodca Chorvátskom
  title: Praktické informácie pre rozumné rozhodnutia.
  lead: Zrozumiteľné články o nehnuteľnostiach, podnikaní, administratíve a živote v Chorvátsku.
contact:
  eyebrow: Kontakt
  title: Porozprávajme sa o vašom pláne.
  lead: Stručne nám opíšte svoju situáciu. Ozveme sa vám, upresníme potreby a navrhneme najlepší ďalší krok.
  hours: Pondelok–piatok · 9:00–17:00
  response: Zvyčajne odpovedáme do jedného pracovného dňa.
faq:
  eyebrow: Časté otázky
  title: Odpovede, ktoré vám pomôžu začať.
  lead: Každý prípad je iný, no tieto odpovede vám poskytnú základnú orientáciu.
  items:
    - - Ako kúpiť nehnuteľnosť v Chorvátsku?
      - Proces sa začína určením rozpočtu a požiadaviek, pokračuje preverovaním nehnuteľnosti a dokumentácie a končí zmluvou, platbou a zápisom vlastníctva. CROBIZ koordinuje komunikáciu a spojí vás s príslušným advokátom alebo notárom.
    - - Ako založiť firmu?
      - Podľa vašich cieľov sa zvolí vhodná právna forma, pripraví dokumentácia, vykoná registrácia a otvorí účet. Pomôžeme vám zorganizovať jednotlivé kroky a nájsť účtovníka.
    - - Ako dlho proces trvá?
      - Trvanie závisí od typu služby, pripravenosti dokumentácie a príslušných inštitúcií. Po úvodnej konzultácii vám dáme realistický časový rámec.
    - - Dá sa všetko vybaviť na diaľku?
      - Mnohé kroky možno riešiť online alebo prostredníctvom plnej moci. Upozorníme vás, ak je osobná prítomnosť nevyhnutná alebo výhodná.
    - - V akom jazyku komunikujete?
      - Webový obsah je dostupný v slovenčine. Priama komunikácia prebieha v češtine, chorvátčine a angličtine a s odborníkmi a inštitúciami ju koordinujeme tak, aby ste vždy rozumeli ďalšiemu kroku.
    - - Pracujete v celom Chorvátsku?
      - Áno. Vďaka sieti partnerov pomáhame klientom v rôznych častiach Chorvátska, vždy podľa konkrétneho projektu a dostupnosti odborníkov.
