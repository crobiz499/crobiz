about:
  eyebrow: O CROBIZ
  title: Specializované poradenství mezi Českem a Chorvatskem.
  lead: CROBIZ je specializovaná poradenská společnost poskytující podporu českým občanům, podnikatelům a investorům v Chorvatsku.
  storyTitle: O společnosti CROBIZ
  story: Zakladatelkou CROBIZ je Ivana Pisac, která díky výborné znalosti chorvatského a českého jazyka i podnikatelského prostředí obou zemí pomáhá klientům koordinovat administrativní a obchodní procesy.
  values:
    - - Dva jazyky, jedno porozumění
      - Plynulá komunikace v češtině a chorvatštině bez zbytečných nedorozumění.
    - - Individuální přístup
      - Řešení přizpůsobené vašemu cíli, rozpočtu a časovým možnostem.
    - - Profesionální koordinace
      - Přehledné kroky, průběžné informace a odpovědnost za komunikaci.
    - - Dlouhodobé vztahy
      - Nejde nám o jednorázovou službu, ale o partnerství založené na důvěře.
  networkTitle: Síť prověřených partnerů po celém Chorvatsku
blog:
  eyebrow: Průvodce Chorvatskem
  title: Praktické informace pro chytrá rozhodnutí.
  lead: Srozumitelné články o nemovitostech, podnikání, administrativě a životě v Chorvatsku.
contact:
  eyebrow: Kontakt
  title: Promluvme si o vašem plánu.
  lead: Popište nám stručně svou situaci. Ozveme se, upřesníme potřeby a navrhneme nejlepší další krok.
  hours: Pondělí–pátek · 9:00–17:00
  response: Odpovídáme zpravidla do jednoho pracovního dne.
faq:
  eyebrow: Časté otázky
  title: Odpovědi, které vám pomohou začít.
  lead: Každý případ je jiný, ale tyto odpovědi vám poskytnou základní orientaci.
  items:
    - - Jak koupit nemovitost v Chorvatsku?
      - Proces začíná definováním rozpočtu a požadavků, pokračuje prověřením nemovitosti a dokumentace a končí smlouvou, platbou a zápisem vlastnictví. CROBIZ koordinuje komunikaci a propojí vás s příslušným advokátem nebo notářem.
    - - Jak založit firmu?
      - Podle vašich cílů se zvolí vhodná právní forma, připraví dokumentace, provede registrace a otevře účet. Pomůžeme vám zorganizovat kroky a najít účetního.
    - - Jak dlouho proces trvá?
      - Doba závisí na typu služby, připravenosti dokumentace a institucích. Po úvodní konzultaci vám dáme realistický časový rámec.
    - - Lze vše vyřídit na dálku?
      - Mnoho kroků lze řešit online nebo prostřednictvím plné moci. Upozorníme vás, pokud je osobní přítomnost nutná nebo výhodná.
    - - V jakém jazyce komunikujete?
      - Komunikujeme česky, chorvatsky a anglicky. S odborníky a institucemi koordinujeme komunikaci tak, abyste vždy rozuměli dalšímu kroku.
    - - Pracujete v celém Chorvatsku?
      - Ano. Díky síti partnerů pomáháme klientům v různých částech Chorvatska, vždy podle konkrétního projektu a dostupnosti odborníků.
