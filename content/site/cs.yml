why:
  eyebrow: Proč Chorvatsko
  title: Stabilní evropské prostředí s výjimečným potenciálem.
  lead: Chorvatsko kombinuje bezpečí Evropské unie, euro, silnou turistickou ekonomiku a životní styl, který dlouhodobě přitahuje české občany i investory.
  reasons:
    - - Člen Evropské unie
      - Společný právní a ekonomický rámec usnadňuje pohyb osob, kapitálu i podnikání.
    - - Euro jako měna
      - Jednodušší platby, plánování investic a menší kurzové riziko.
    - - Stabilní trh
      - Předvídatelné prostředí a rostoucí zájem zahraničních investorů.
    - - Atraktivní investice
      - Příležitosti v nemovitostech, turismu, službách a lokálním podnikání.
    - - Rozvinutý turismus
      - Silná mezinárodní poptávka a dlouhodobá známost destinace.
    - - Výborná dostupnost
      - Silniční i letecké spojení s Českou republikou během celého roku.
    - - Kvalita života
      - Bezpečí, příroda, klima, gastronomie a blízkost moře.
  sectorsTitle: Příležitosti, které dávají smysl
  sectors:
    - Rezidenční nemovitosti
    - Turistické ubytování
    - Služby a obchod
    - Lokální partnerství
