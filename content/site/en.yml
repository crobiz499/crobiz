contact:
  eyebrow: Contact
  title: Let’s talk about your plans.
  lead: Tell us briefly about your situation. We will get back to clarify your needs and suggest the best next step.
  hours: Monday–Friday · 9:00–17:00
  response: We usually respond within one working day.
faq:
  eyebrow: Frequently asked questions
  title: Answers that help you get started.
  lead: Every case is different, but these answers provide a useful starting point.
  items:
    - - How do I buy property in Croatia?
      - The process starts with defining your budget and requirements, continues with property and document checks, and ends with the contract, payment and ownership registration. CROBIZ coordinates communication and introduces the appropriate professional.
    - - How do I establish a company?
      - We help identify a suitable legal form, organise the documentation, registration, bank account and accounting relationship.
    - - How long does the process take?
      - Timing depends on the service, document readiness and institutions involved. We provide a realistic timeline after the initial consultation.
    - - Can everything be handled remotely?
      - Many steps can be completed online or through a power of attorney. We will tell you when personal presence is necessary or beneficial.
    - - Which languages do you speak?
      - We communicate in Czech, Croatian and English and coordinate communication with specialists and institutions.
    - - Do you work throughout Croatia?
      - Yes. Our partner network allows us to support projects in different parts of Croatia, subject to the project and specialist availability.
