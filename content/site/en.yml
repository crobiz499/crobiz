why:
  eyebrow: Why Croatia
  title: A stable European environment with exceptional potential.
  lead: Croatia combines the security of the European Union, the euro, a strong tourism economy and a lifestyle that continues to attract Czech citizens and investors.
  reasons:
    - - European Union member
      - A shared legal and economic framework makes movement, investment and business easier.
    - - Euro currency
      - Simpler payments and investment planning with less currency risk.
    - - Stable market
      - A predictable environment with growing international interest.
    - - Attractive investments
      - Opportunities in property, tourism, services and local businesses.
    - - Developed tourism
      - Strong international demand and long-term destination recognition.
    - - Excellent connections
      - Road and air connections with Czechia throughout the year.
    - - Quality of life
      - Safety, nature, climate, food and proximity to the sea.
  sectorsTitle: Opportunities that make sense
  sectors:
    - Residential property
    - Tourism accommodation
    - Services and commerce
    - Local partnerships
