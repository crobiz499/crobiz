about:
  eyebrow: About CROBIZ
  title: Specialist consultancy between Czechia and Croatia.
  lead: CROBIZ is a specialist consultancy supporting Czech citizens, entrepreneurs and investors in Croatia.
  storyTitle: About CROBIZ
  story: CROBIZ was founded by Ivana Pisac, whose excellent knowledge of Croatian and Czech, together with the business environments of both countries, helps clients coordinate administrative and business processes.
  values:
    - - Two languages, shared understanding
      - Fluent communication in Czech and Croatian without unnecessary misunderstandings.
    - - Personal approach
      - A solution adapted to your goals, budget and timeline.
    - - Professional coordination
      - Clear steps, regular updates and ownership of communication.
    - - Long-term relationships
      - We aim for trusted partnerships, not one-off transactions.
  networkTitle: A network of trusted partners across Croatia
