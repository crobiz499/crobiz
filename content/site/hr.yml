why:
  eyebrow: Zašto Hrvatska
  title: Stabilno europsko okruženje s iznimnim potencijalom.
  lead: Hrvatska spaja sigurnost Europske unije, euro, snažno turističko gospodarstvo i stil života koji trajno privlači češke građane i investitore.
  reasons:
    - - Članica Europske unije
      - Zajednički pravni i gospodarski okvir olakšava kretanje ljudi, kapitala i poslovanje.
    - - Euro kao valuta
      - Jednostavnija plaćanja, planiranje ulaganja i manji valutni rizik.
    - - Stabilno tržište
      - Predvidljivo okruženje i rastući interes stranih ulagača.
    - - Atraktivna ulaganja
      - Prilike u nekretninama, turizmu, uslugama i lokalnom poslovanju.
    - - Razvijen turizam
      - Snažna međunarodna potražnja i dugoročna prepoznatljivost destinacije.
    - - Odlična povezanost
      - Cestovne i zračne veze s Češkom tijekom cijele godine.
    - - Kvaliteta života
      - Sigurnost, priroda, klima, gastronomija i blizina mora.
  sectorsTitle: Prilike koje imaju smisla
  sectors:
